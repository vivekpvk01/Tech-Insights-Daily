<!DOCTYPE html>
<html>
<head>
  <title>Tech Insights Daily</title>
</head>
<body>
  <h1>🚀 Tech Insights Daily</h1>
  <div id="posts"></div>

  <script>
    async function loadPosts() {
      const response = await fetch("https://api.github.com/repos/vivekpvk01/Tech-Insights-Daily/contents/posts");
      const files = await response.json();

      const container = document.getElementById("posts");

      files.forEach(file => {
        const postLink = document.createElement("a");
        postLink.href = file.html_url;
        postLink.innerText = file.name.replace(".md", "");
        postLink.style.display = "block";
        postLink.style.margin = "10px 0";

        container.appendChild(postLink);
      });
    }

    loadPosts();
  </script>
</body>
</html>
